name: macOS Package

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/macos-package.yml'
      - 'build/**'
      - 'src/**'
      - 'product.json'
      - 'package.json'
      - 'package-lock.json'

permissions:
  contents: read

env:
  VSCODE_QUALITY: 'oss'

jobs:
  package:
    name: macOS ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: macos-13
          - arch: arm64
            runner: macos-14

    env:
      VSCODE_ARCH: ${{ matrix.arch }}
      npm_config_arch: ${{ matrix.arch }}
      ELECTRON_SKIP_BINARY_DOWNLOAD: 1
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Prepare node_modules cache key
        run: mkdir -p .build && node build/azure-pipelines/common/computeNodeModulesCacheKey.ts darwin $VSCODE_ARCH $(node -p process.arch) > .build/packagelockhash

      - name: Restore node_modules cache
        id: cache-node-modules
        uses: actions/cache/restore@v5
        with:
          path: .build/node_modules_cache
          key: node_modules-macos-${{ matrix.arch }}-${{ hashFiles('.build/packagelockhash') }}

      - name: Extract node_modules cache
        if: steps.cache-node-modules.outputs.cache-hit == 'true'
        run: tar -xzf .build/node_modules_cache/cache.tgz

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: |
          set -e
          c++ --version
          xcode-select -print-path
          python3 -m pip install --break-system-packages setuptools

          for i in {1..5}; do
            npm ci && break
            if [ $i -eq 5 ]; then
              echo "Npm install failed too many times" >&2
              exit 1
            fi
            echo "Npm install failed $i, trying again..."
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          npm_config_arch: ${{ env.VSCODE_ARCH }}
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
          # Avoid using dlopen to load Kerberos on macOS which can cause missing libraries.
          GYP_DEFINES: "kerberos_use_rtld=false"

      - name: Create node_modules archive
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: |
          set -e
          node build/azure-pipelines/common/listNodeModules.ts .build/node_modules_list.txt
          mkdir -p .build/node_modules_cache
          tar -czf .build/node_modules_cache/cache.tgz --files-from .build/node_modules_list.txt

      - name: Prepare built-in extensions cache key
        run: node build/azure-pipelines/common/computeBuiltInDepsCacheKey.ts > .build/builtindepshash

      - name: Restore built-in extensions cache
        id: cache-builtin-extensions
        uses: actions/cache/restore@v5
        with:
          enableCrossOsArchive: true
          path: .build/builtInExtensions
          key: builtin-extensions-${{ hashFiles('.build/builtindepshash') }}

      - name: Download built-in extensions
        if: steps.cache-builtin-extensions.outputs.cache-hit != 'true'
        run: node build/lib/builtInExtensions.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compile core assets
        run: npm run gulp core-ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build macOS app
        run: npm run gulp vscode-darwin-${VSCODE_ARCH}-min
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prune non-target Copilot native binaries
        run: |
          set -e
          APP_ROOT="$(dirname "$PWD")/VSCode-darwin-${VSCODE_ARCH}"
          APP_NAME="$(ls "$APP_ROOT" | head -n 1)"
          COPILOT_VENDOR="$APP_ROOT/$APP_NAME/Contents/Resources/app/extensions/copilot/node_modules/@anthropic-ai/claude-agent-sdk/vendor"

          if [ -d "$COPILOT_VENDOR" ]; then
            if [ "$VSCODE_ARCH" = "arm64" ]; then
              KEEP_A="arm64-darwin"
              KEEP_B="darwin-arm64"
            else
              KEEP_A="x64-darwin"
              KEEP_B="darwin-x64"
            fi

            find "$COPILOT_VENDOR" -type d \( -name "*darwin*" -o -name "*macos*" \) | while read -r CANDIDATE; do
              BASENAME="$(basename "$CANDIDATE")"
              case "$BASENAME" in
                "$KEEP_A"|"$KEEP_B")
                  ;;
                *darwin*|*macos*)
                  rm -rf "$CANDIDATE"
                  ;;
              esac
            done
          fi

      - name: Verify Mach-O architecture
        run: |
          set -e
          APP_ROOT="$(dirname "$PWD")/VSCode-darwin-${VSCODE_ARCH}"
          APP_NAME="$(ls "$APP_ROOT" | head -n 1)"
          APP_PATH="$APP_ROOT/$APP_NAME" node build/darwin/verify-macho.ts ${VSCODE_ARCH}

      - name: Package ZIP and DMG
        run: |
          set -e
          ARTIFACT_DIR="$PWD/.build/artifacts/${VSCODE_ARCH}"
          mkdir -p "$ARTIFACT_DIR"

          pushd "../VSCode-darwin-${VSCODE_ARCH}" >/dev/null
          zip -Xry "$ARTIFACT_DIR/VSCode-darwin-${VSCODE_ARCH}.zip" *
          popd >/dev/null

          node build/darwin/create-dmg.ts "$(dirname "$PWD")" "$ARTIFACT_DIR"
          python3 build/darwin/patch-dmg.py "$ARTIFACT_DIR/VSCode-darwin-${VSCODE_ARCH}.dmg" resources/darwin/code.icns

      - name: Upload macOS package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: vscode-macos-${{ matrix.arch }}-${{ github.run_attempt }}
          path: |
            .build/artifacts/${{ matrix.arch }}/VSCode-darwin-${{ matrix.arch }}.zip
            .build/artifacts/${{ matrix.arch }}/VSCode-darwin-${{ matrix.arch }}.dmg
          if-no-files-found: error